parameters:
  appName: ''
  buildDevCmd: ''
  buildProdCmd: ''

steps:
- task: UseNode@1
  displayName: 'Install Node.js'
  inputs:
    version: $(nodeVersion)

- task: Cache@2
  displayName: 'Cache npm'
  inputs:
    key: 'npm | "$(Agent.OS)" | package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(Pipeline.Workspace)/.npm'

- script: npm ci --cache $(Pipeline.Workspace)/.npm --prefer-offline --legacy-peer-deps
  displayName: 'Install dependencies'

- script: npm install -g @angular/cli
  displayName: 'Install Angular CLI'

- script: |
    if [ "$(envName)" = "prod" ]; then
      echo "Running PROD build for ${{ parameters.appName }}"
      npm run ${{ parameters.buildProdCmd }}
    else
      echo "Running DEV build for ${{ parameters.appName }}"
      npm run ${{ parameters.buildDevCmd }}
    fi
  displayName: 'Build based on branch'

- task: ArchiveFiles@2
  displayName: 'Archive build'
  inputs:
    rootFolderOrFile: 'dist/phonix/'
    includeRootFolder: false
    archiveType: zip
    archiveFile: '$(Build.ArtifactStagingDirectory)/${{ parameters.appName }}.zip'

- publish: '$(Build.ArtifactStagingDirectory)/${{ parameters.appName }}.zip'
  artifact: ${{ parameters.appName }}
